name = "bondoya-ki-proxy"
main = "src/index.js"
compatibility_date = "2026-01-01"

routes = [
  { pattern = "api.bondoya.no", custom_domain = true },
  { pattern = "ki.bondoya.no", custom_domain = true }
]

# ANTHROPIC_API_KEY og APP_SHARED_SECRET settes IKKE her — sett dem med:
#   wrangler secret put ANTHROPIC_API_KEY
#   wrangler secret put APP_SHARED_SECRET
# aldri i denne filen eller noe annet sted i det offentlige repoet.
# APP_SHARED_SECRET er en delt hemmelighet KUN denne appen kjenner — samme
# idé som GitHub-tokenet, hindrer at andre kaller Worker-URL-en direkte og
# bruker opp Anthropic-kredittene dine (CORS stopper kun nettlesere, ikke
# curl/script). Generer f.eks. med: openssl rand -hex 32

[vars]
ANTHROPIC_MODEL = "claude-sonnet-5"
# Opphavet som får lov til å kalle proxyen (CORS). Merk: koden bruker denne
# verdien direkte i Access-Control-Allow-Origin, ikke som en faktisk
# kommaseparert liste (til tross for navnet under) — kun ett opphav støttes.
ALLOWED_ORIGIN = "https://bondoya.no"
